services:
  comfyui:
    init: true
    container_name: comfyui
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Etc/UTC}
        LOCALE: ${LOCALE:-en_US.UTF-8}
        CUDA_VERSION: ${CUDA_VERSION:-12.8}
        CUDA_MINOR_FALLBACK: ${CUDA_MINOR_FALLBACK:-8}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
        PYTHON_MINOR_FALLBACK: ${PYTHON_MINOR_FALLBACK:-12}
        TORCH_VERSION: ${TORCH_VERSION:-2.7.0}
        TORCHVISION_VERSION: ${TORCHVISION_VERSION:-0.22.0}
        TORCHAUDIO_VERSION: ${TORCHAUDIO_VERSION:-2.7.0}
        XFORMERS_VERSION: ${XFORMERS_VERSION:-v0.0.30}
        GCC_VERSION: ${GCC_VERSION:-14}
    image: "loopyd/comfyui-boot:cu128-3dmax"
    ports:
      - "8188:8188"
    volumes:
      - "./storage:/root"
      - "./storage-models/models:/root/ComfyUI/models"
      - "./storage-models/hf-hub:/root/.cache/huggingface/hub"
      - "./storage-models/torch-hub:/root/.cache/torch/hub"
      - "./storage-user/input:/root/ComfyUI/input"
      - "./storage-user/output:/root/ComfyUI/output"
      - "./storage-user/workflows:/root/ComfyUI/user/default/workflows"
    environment:
      - TZ=${TZ:-Etc/UTC}
      - LANG=${LOCALE:-en_US.UTF-8}
      - LC_ALL=${LOCALE:-en_US.UTF-8}
      - CLI_ARGS=
    security_opt:
      # - "label=type:nvidia_container_t"
      - "label=disable"
      - "seccomp=unconfined"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
